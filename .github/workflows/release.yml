name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 2.1 or v2.1)"
        required: true
        type: string
      release_notes:
        description: "Release notes (leave blank to generate from commits since the last tag)"
        required: false
        type: string
      promote_via:
        description: "Promote staging to production"
        required: true
        type: choice
        default: merge
        options:
          - merge
          - pull_request

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: staging
          token: ${{ secrets.RELEASE_PAT || github.token }}

      - name: Validate version
        id: version
        env:
          RAW_VERSION: ${{ inputs.version }}
        run: |
          version="${RAW_VERSION#v}"
          if [[ ! "$version" =~ ^[0-9]+(\.[0-9]+){1,2}$ ]]; then
            echo "::error::Version must look like 2.1 or 2.1.0 (optional leading v)"
            exit 1
          fi
          version="v${version}"
          if git rev-parse "refs/tags/${version}" >/dev/null 2>&1; then
            echo "::error::Tag ${version} already exists"
            exit 1
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Fetch branches
        run: git fetch origin staging main

      - name: Resolve staging ref
        id: refs
        run: |
          staging_sha="$(git rev-parse origin/staging)"
          echo "staging_sha=${staging_sha}" >> "$GITHUB_OUTPUT"
          echo "Release target: origin/staging @ ${staging_sha}"

      - name: Validate merge into main
        if: inputs.promote_via == 'merge'
        run: |
          git checkout -B merge-check origin/main
          if ! git merge --no-commit --no-ff origin/staging; then
            echo "::error::staging does not merge cleanly into main. Resolve conflicts first, or use pull_request mode."
            git merge --abort
            exit 1
          fi
          git merge --abort
          git checkout staging

      - name: Generate release notes
        env:
          MANUAL_NOTES: ${{ inputs.release_notes }}
        run: |
          if [[ -n "${MANUAL_NOTES}" ]]; then
            printf '%s\n' "$MANUAL_NOTES" > release-notes.md
          else
            bash .github/scripts/generate-release-notes.sh origin/staging > release-notes.md
          fi

      - name: Create release tag on staging
        env:
          VERSION: ${{ steps.version.outputs.version }}
          STAGING_SHA: ${{ steps.refs.outputs.staging_sha }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$VERSION" -m "Release $VERSION" "$STAGING_SHA"
          git push origin "$VERSION"

      - name: Merge staging into main
        if: inputs.promote_via == 'merge'
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout main
          git pull origin main
          git merge origin/staging --no-edit -m "Release ${VERSION}"
          git push origin main

      - name: Open release pull request
        if: inputs.promote_via == 'pull_request'
        uses: actions/github-script@v7
        env:
          VERSION: ${{ steps.version.outputs.version }}
        with:
          script: |
            const fs = require("fs");
            const version = process.env.VERSION;
            const body = fs.readFileSync("release-notes.md", "utf8");
            const { owner, repo } = context.repo;

            const existing = await github.rest.pulls.list({
              owner,
              repo,
              state: "open",
              head: `${owner}:staging`,
              base: "main",
            });

            if (existing.data.length > 0) {
              const pr = existing.data[0];
              core.info(`Open release PR already exists: #${pr.number}`);
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: pr.number,
                body: [
                  `Release workflow triggered for **${version}**.`,
                  `Tag \`${version}\` now points at the current \`staging\` commit.`,
                  "",
                  "Release notes:",
                  body,
                ].join("\n"),
              });
              return;
            }

            const { data: pr } = await github.rest.pulls.create({
              owner,
              repo,
              title: `Release ${version}`,
              head: "staging",
              base: "main",
              body: [
                `Release **${version}** from \`staging\`.`,
                "",
                `Tag \`${version}\` points at the current \`staging\` commit.`,
                "Merging this PR deploys production (push to \`main\`).",
                "",
                body,
              ].join("\n"),
            });

            core.info(`Created release PR #${pr.number}`);

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          target_commitish: ${{ steps.refs.outputs.staging_sha }}
          name: Release ${{ steps.version.outputs.version }}
          body_path: release-notes.md
          token: ${{ secrets.RELEASE_PAT || github.token }}
