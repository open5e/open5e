name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 2.1 or v2.1)"
        required: true
        type: string
      release_notes:
        description: "Release notes (leave blank to generate from commits since the last tag)"
        required: false
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: staging
          token: ${{ secrets.RELEASE_PAT || github.token }}

      - name: Validate version
        id: version
        env:
          RAW_VERSION: ${{ inputs.version }}
        run: |
          version="${RAW_VERSION#v}"
          if [[ ! "$version" =~ ^[0-9]+(\.[0-9]+){1,2}$ ]]; then
            echo "::error::Version must look like 2.1 or 2.1.0 (optional leading v)"
            exit 1
          fi
          version="v${version}"
          if git rev-parse "refs/tags/${version}" >/dev/null 2>&1; then
            echo "::error::Tag ${version} already exists"
            exit 1
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Fetch branches
        run: git fetch origin staging main

      - name: Sync main into staging
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout staging
          git pull origin staging

          if git merge-base --is-ancestor origin/main HEAD; then
            echo "staging already contains all of main"
          else
            echo "Merging main into staging before release"
            if ! git merge origin/main --no-edit -m "chore: sync main into staging before release"; then
              echo "::error::Could not merge main into staging."
              echo "::error::Resolve conflicts on staging (keep staging's version for duplicate release changes), push, then re-run."
              exit 1
            fi
            git push origin staging
          fi

      - name: Validate fast-forward promotion
        run: |
          git fetch origin staging main
          if ! git merge-base --is-ancestor origin/main origin/staging; then
            echo "::error::main is not an ancestor of staging after sync."
            echo "::error::main and staging have diverged in a way that requires manual reconciliation."
            exit 1
          fi
          echo "main can be fast-forwarded to staging"

      - name: Resolve staging ref
        id: refs
        run: |
          staging_sha="$(git rev-parse origin/staging)"
          echo "staging_sha=${staging_sha}" >> "$GITHUB_OUTPUT"
          echo "Release target: origin/staging @ ${staging_sha}"

      - name: Generate release notes
        env:
          MANUAL_NOTES: ${{ inputs.release_notes }}
        run: |
          if [[ -n "${MANUAL_NOTES}" ]]; then
            printf '%s\n' "$MANUAL_NOTES" > release-notes.md
          else
            bash .github/scripts/generate-release-notes.sh origin/staging > release-notes.md
          fi

      - name: Create release tag on staging
        env:
          VERSION: ${{ steps.version.outputs.version }}
          STAGING_SHA: ${{ steps.refs.outputs.staging_sha }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$VERSION" -m "Release $VERSION" "$STAGING_SHA"
          git push origin "$VERSION"

      - name: Promote staging to main
        run: git push origin origin/staging:refs/heads/main

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          target_commitish: ${{ steps.refs.outputs.staging_sha }}
          name: Release ${{ steps.version.outputs.version }}
          body_path: release-notes.md
          token: ${{ secrets.RELEASE_PAT || github.token }}
