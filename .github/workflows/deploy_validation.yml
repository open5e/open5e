name: Deploy Validation

on:
  push:
    branches:
      - staging
      - main
      - master
  pull_request:
    branches:
      - staging
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 22 with npm 11
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm install -g npm@11
      - run: npm ci
      - run: npm run build
      - run: npm run generate
      - run: npm run lint:ci
      - run: npm run test
